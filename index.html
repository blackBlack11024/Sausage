<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>正宗台味打香腸</title>
    <style>
        /* 華國美學靈魂：標楷體與新細明體，高飽和度底色 */
        body {
            font-family: "標楷體", "BiauKai", "新細明體", "PMingLiU", serif;
            text-align: center;
            background-color: #0000FF; /* 正藍色底 */
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-tap-highlight-color: transparent; 
            overflow-x: hidden; /* 防止特效造成橫向滾動條 */
        }
        .marquee-box {
            width: 100%;
            background-color: #FF0000; /* 正紅色 */
            color: #FFFF00; /* 正黃色 */
            font-size: 1.5em;
            font-weight: bold;
            padding: 5px 0;
            border: 3px solid #FFFF00;
            margin-bottom: 15px;
            box-sizing: border-box;
        }
        h1 { 
            color: #FFFF00; 
            text-shadow: 2px 2px 0px #FF0000, -2px -2px 0px #FF0000, 2px -2px 0px #FF0000, -2px 2px 0px #FF0000;
            font-size: 2.5em;
            margin: 10px 0;
            letter-spacing: 5px;
        }
        .stats {
            background: #FFFFFF;
            padding: 15px;
            border: 5px double #0000FF;
            margin-bottom: 20px;
            width: 90%;
            max-width: 350px;
            box-shadow: 5px 5px 0px #FF0000;
        }
        .stats p { 
            margin: 10px 0; 
            font-size: 1.5em; 
            font-weight: bold; 
            color: #000000;
        }
        .dice-container {
            display: flex;
            gap: 25px;
            margin: 15px 0;
        }
        .die {
            width: 90px;
            height: 90px;
            background: #FFFFFF;
            border: 4px solid #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 4em;
            font-weight: bold;
            color: #FF0000;
            box-shadow: 4px 4px 0px #000000;
        }
        /* 骰子搖晃動畫 */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            25% { transform: translate(-1px, -2px) rotate(-5deg); }
            50% { transform: translate(-3px, 0px) rotate(5deg); }
            75% { transform: translate(2px, 2px) rotate(-5deg); }
            100% { transform: translate(1px, -1px) rotate(0deg); }
        }
        .rolling {
            animation: shake 0.2s infinite;
        }
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 90%;
            max-width: 350px;
            margin-bottom: 20px;
        }
        button {
            font-family: "標楷體", "BiauKai", serif;
            color: #FFFFFF;
            border: 4px outset #FFFFFF;
            padding: 15px;
            font-size: 1.8em;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
        button:active {
            border: 4px inset #FFFFFF;
        }
        button:disabled {
            filter: grayscale(100%);
            cursor: not-allowed;
        }
        #rollBtn { background-color: #FF0000; }
        #addMoneyBtn { background-color: #008000; }
        #result-box {
            background-color: #FFFF00;
            border: 4px solid #FF0000;
            width: 90%;
            max-width: 350px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            box-shadow: 4px 4px 0px #000000;
            box-sizing: border-box;
        }
        #result {
            font-size: 1.6em;
            font-weight: bold;
            color: #0000FF;
            margin: 0;
        }
        .highlight {
            color: #FF0000;
            font-size: 1.5em;
        }

        /* --- 新增：香腸爆炸特效 CSS --- */
        .sausage-effect {
            position: fixed;
            font-size: 40px; /* 香腸大小 */
            pointer-events: none; /* 讓點擊穿透特效，不影響操作 */
            z-index: 9999; /* 確保在最上層 */
            opacity: 0;
        }

        /* 爆炸動畫定義 */
        @keyframes explosion {
            0% {
                transform: translate(0, 0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1; /* 快速顯現 */
            }
            100% {
                /* 往隨機方向飛散 (由 JS 設定變數) */
                transform: translate(var(--tx), var(--ty)) rotate(var(--tr));
                opacity: 0; /* 慢慢消失 */
            }
        }
    </style>
</head>
<body>

    <div class="marquee-box">
        <marquee scrollamount="10">🎉 歡迎光臨正宗台味打香腸攤！十八啦！轉不停！炸香腸！ 🎉</marquee>
    </div>

    <h1>打香腸</h1>

    <div class="stats">
        <p>口袋現金：<span id="money" style="color: #FF0000;">1000</span> 元</p>
        <p>贏得香腸：<span id="sausages" style="color: #008000;">0</span> 根</p>
    </div>

    <div class="dice-container">
        <div class="die" id="die1">骰</div>
        <div class="die" id="die2">子</div>
    </div>

    <div class="btn-container">
        <button id="rollBtn" onclick="rollDice()">付 40 元拚了！</button>
        <button id="addMoneyBtn" onclick="addMoney()">找阿嬤拿 1000 元</button>
    </div>

    <div id="result-box">
        <div id="result">準備好了嗎？<br>放手一搏！</div>
    </div>

    <script>
        let currentMoney = 1000;
        let totalSausages = 0;
        let isRolling = false;

        function addMoney() {
            if (isRolling) return;
            currentMoney += 1000;
            document.getElementById('money').innerText = currentMoney;
            document.getElementById('result').innerHTML = "阿嬤贊助了 1000 元！<br>繼續拚！";
            // 補錢時不炸香腸
        }

        // --- 新增：觸發香腸爆炸特效的函數 ---
        function spawnSausages(count) {
            // 從畫面兩側炸出
            const sides = ['left', 'right'];
            const viewWidth = window.innerWidth;
            const viewHeight = window.innerHeight;

            for (let i = 0; i < count; i++) {
                const sausage = document.createElement('div');
                sausage.className = 'sausage-effect';
                sausage.innerText = '🌭'; // 使用 Emoji

                // 隨機選擇一邊開始
                const startSide = sides[Math.floor(Math.random() * sides.length)];
                
                // 設定初始位置 (畫面中間區域的兩側邊緣)
                if (startSide === 'left') {
                    sausage.style.left = '-50px';
                } else {
                    sausage.style.right = '-50px';
                }
                // 垂直位置在畫面中間 20%~80% 處隨機
                sausage.style.top = (Math.random() * 60 + 20) + 'vh';

                // 設定飛散的目標隨機變數 (CSS 會讀取)
                // 往中間飛 (tx)
                const tx = (startSide === 'left' ? 1 : -1) * (viewWidth * 0.4 + Math.random() * 100);
                // 向上或向下飛 (ty)
                const ty = (Math.random() - 0.5) * 200;
                // 旋轉角度
                const tr = (Math.random() - 0.5) * 1080 + 'deg'; // 轉很多圈

                sausage.style.setProperty('--tx', tx + 'px');
                sausage.style.setProperty('--ty', ty + 'px');
                sausage.style.setProperty('--tr', tr);

                // 設定動畫時間 (隨機 1.5~2.5 秒，製造錯落感)
                const duration = 1.5 + Math.random() * 1;
                sausage.style.animation = `explosion ${duration}s ease-out forwards`;

                document.body.appendChild(sausage);

                // 動畫結束後移除元素，防止浪費資源
                setTimeout(() => {
                    sausage.remove();
                }, duration * 1000);
            }
        }

        function rollDice() {
            if (isRolling) return;
            if (currentMoney < 40) {
                alert("少年耶，你錢不夠啦！先去找阿嬤拿錢！");
                return;
            }

            isRolling = true;
            currentMoney -= 40;
            document.getElementById('money').innerText = currentMoney;
            
            document.getElementById('rollBtn').disabled = true;
            document.getElementById('addMoneyBtn').disabled = true;
            document.getElementById('result').innerHTML = "十八啦！<br>轉動中...";

            const die1El = document.getElementById('die1');
            const die2El = document.getElementById('die2');
            
            die1El.classList.add('rolling');
            die2El.classList.add('rolling');

            let rollInterval = setInterval(() => {
                die1El.innerText = Math.floor(Math.random() * 6) + 1;
                die2El.innerText = Math.floor(Math.random() * 6) + 1;
            }, 100);

            setTimeout(() => {
                clearInterval(rollInterval);
                die1El.classList.remove('rolling');
                die2El.classList.remove('rolling');

                const d1 = Math.floor(Math.random() * 6) + 1;
                const d2 = Math.floor(Math.random() * 6) + 1;
                const sum = d1 + d2;

                die1El.innerText = d1;
                die2El.innerText = d2;

                // 根據規則判斷香腸數量
                let won = 0;
                if (sum === 2 || sum === 12) won = 4;
                else if (sum === 3 || sum === 11) won = 3;
                else if (sum === 4 || sum === 10) won = 2;
                else if (sum === 5 || sum === 9) won = 1;
                else won = 0; 

                // 更新香腸數
                totalSausages += won;
                document.getElementById('sausages').innerText = totalSausages;

                const resultDiv = document.getElementById('result');
                if (won > 0) {
                    resultDiv.innerHTML = `點數和：<span class="highlight">${sum}</span><br>讚啦！贏得 <span style="color: #FF0000; font-size: 1.2em;">${won}</span> 根香腸！`;
                    
                    // --- 修改：在這裡觸發爆炸特效 ---
                   
                    spawnSausages(won); 

                } else {
                    resultDiv.innerHTML = `點數和：<span class="highlight">${sum}</span><br>槓龜！沒半根！`;
                }

                isRolling = false;
                document.getElementById('rollBtn').disabled = false;
                document.getElementById('addMoneyBtn').disabled = false;
            }, 2000); 
        }
    </script>
</body>
</html>
