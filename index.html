<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>正宗台味打香腸</title>
    <style>
        body {
            font-family: "標楷體", "BiauKai", "新細明體", "PMingLiU", serif;
            text-align: center;
            background-color: #0000FF; 
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-tap-highlight-color: transparent; 
            overflow-x: hidden;
        }
        .marquee-box {
            width: 100%;
            background-color: #FF0000;
            color: #FFFF00;
            font-size: 1.5em;
            font-weight: bold;
            padding: 5px 0;
            border: 3px solid #FFFF00;
            margin-bottom: 15px;
            box-sizing: border-box;
        }
        h1 { 
            color: #FFFF00; 
            text-shadow: 2px 2px 0px #FF0000, -2px -2px 0px #FF0000, 2px -2px 0px #FF0000, -2px 2px 0px #FF0000;
            font-size: 2.5em;
            margin: 10px 0;
            letter-spacing: 5px;
        }
        .stats {
            background: #FFFFFF;
            padding: 15px;
            border: 5px double #0000FF;
            margin-bottom: 20px;
            width: 90%;
            max-width: 350px;
            box-shadow: 5px 5px 0px #FF0000;
        }
        .stats p { 
            margin: 10px 0; 
            font-size: 1.5em; 
            font-weight: bold; 
            color: #000000;
        }
        .dice-container {
            display: flex;
            gap: 25px;
            margin: 15px 0;
        }
        .die {
            width: 90px;
            height: 90px;
            background: #FFFFFF;
            border: 4px solid #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 4em;
            font-weight: bold;
            color: #FF0000;
            box-shadow: 4px 4px 0px #000000;
        }
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            25% { transform: translate(-1px, -2px) rotate(-5deg); }
            50% { transform: translate(-3px, 0px) rotate(5deg); }
            75% { transform: translate(2px, 2px) rotate(-5deg); }
            100% { transform: translate(1px, -1px) rotate(0deg); }
        }
        .rolling { animation: shake 0.2s infinite; }
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 90%;
            max-width: 350px;
            margin-bottom: 20px;
        }
        button {
            font-family: "標楷體", "BiauKai", serif;
            color: #FFFFFF;
            border: 4px outset #FFFFFF;
            padding: 15px;
            font-size: 1.8em;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
        button:active { border: 4px inset #FFFFFF; }
        #rollBtn { background-color: #FF0000; }
        #addMoneyBtn { background-color: #008000; }
        #result-box {
            background-color: #FFFF00;
            border: 4px solid #FF0000;
            width: 90%;
            max-width: 350px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            box-shadow: 4px 4px 0px #000000;
            box-sizing: border-box;
        }
        #result { font-size: 1.6em; font-weight: bold; color: #0000FF; margin: 0; }
        .highlight { color: #FF0000; font-size: 1.5em; }

        /* --- 香腸特效 --- */
        .sausage-effect {
            position: fixed;
            font-size: 45px;
            pointer-events: none;
            z-index: 9999;
            opacity: 0;
        }
        @keyframes explosion {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) rotate(var(--tr)); opacity: 0; }
        }

        /* --- 假通知特效 --- */
        #fake-notify {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background-color: rgba(255, 255, 255, 0.95);
            border-left: 10px solid #008000;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 10000;
            transition: top 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #fake-notify.show { top: 20px; }
        .notify-icon { font-size: 24px; }
        .notify-content { text-align: left; }
        .notify-title { font-weight: bold; color: #333; font-size: 1.1em; }
        .notify-msg { color: #666; font-size: 0.9em; margin-top: 2px; }
    </style>
</head>
<body>

    <div id="fake-notify">
        <div class="notify-icon">💰</div>
        <div class="notify-content">
            <div class="notify-title">銀行通知</div>
            <div class="notify-msg" id="notify-text">已經轉帳 1000 元給李彥霆</div>
        </div>
    </div>

    <div class="marquee-box">
        <marquee scrollamount="10">🎉 正宗台味打香腸！童叟無欺！新鮮美味！ 🎉</marquee>
    </div>

    <h1>打香腸</h1>

    <div class="stats">
        <p>口袋現金：<span id="money" style="color: #FF0000;">1000</span> 元</p>
        <p>贏得香腸：<span id="sausages" style="color: #008000;">0</span> 根</p>
    </div>

    <div class="dice-container">
        <div class="die" id="die1">骰</div>
        <div class="die" id="die2">子</div>
    </div>

    <div class="btn-container">
        <button id="rollBtn" onclick="rollDice()">付 40 元拚了！</button>
        <button id="addMoneyBtn" onclick="addMoney()">找阿嬤拿 1000 元</button>
    </div>

    <div id="result-box">
        <div id="result">準備好了嗎？<br>放手一搏！</div>
    </div>

    <script>
        let currentMoney = 1000;
        let totalSausages = 0;
        let isRolling = false;

        function addMoney() {
            if (isRolling) return;
            currentMoney += 1000;
            document.getElementById('money').innerText = currentMoney;
            
            // 彈出假通知
            const notify = document.getElementById('fake-notify');
            notify.classList.add('show');
            
            // 3秒後收起通知
            setTimeout(() => {
                notify.classList.remove('show');
            }, 3000);

            document.getElementById('result').innerHTML = "財富自由了！<br>現金已入帳！";
        }

        function spawnSausages(wonCount) {
            const viewWidth = window.innerWidth;
            const viewHeight = window.innerHeight;
            
            // 根據中獎數量決定噴出的香腸密度
            // 1根中獎 -> 噴1根
            // 2根中獎 -> 噴8根
            // 3根中獎 -> 噴15根
            // 4根中獎 -> 噴45根 (滿屏)
            let spawnAmount = 0;
            if (wonCount === 1) spawnAmount = 1;
            else if (wonCount === 2) spawnAmount = 8;
            else if (wonCount === 3) spawnAmount = 15;
            else if (wonCount === 4) spawnAmount = 45;

            for (let i = 0; i < spawnAmount; i++) {
                const sausage = document.createElement('div');
                sausage.className = 'sausage-effect';
                sausage.innerText = '🌭';

                // 如果是滿屏，隨機散佈在螢幕各處噴出
                if (wonCount === 4) {
                    sausage.style.left = Math.random() * 100 + 'vw';
                    sausage.style.top = Math.random() * 100 + 'vh';
                } else {
                    // 普通中獎從兩側噴
                    const side = Math.random() > 0.5 ? 'left' : 'right';
                    sausage.style[side] = '-50px';
                    sausage.style.top = (Math.random() * 60 + 20) + 'vh';
                }

                const tx = (Math.random() - 0.5) * viewWidth * 1.5;
                const ty = (Math.random() - 0.5) * viewHeight * 1.5;
                const tr = (Math.random() - 0.5) * 1080 + 'deg';

                sausage.style.setProperty('--tx', tx + 'px');
                sausage.style.setProperty('--ty', ty + 'px');
                sausage.style.setProperty('--tr', tr);

                const duration = 1 + Math.random() * 2;
                sausage.style.animation = `explosion ${duration}s ease-out forwards`;

                document.body.appendChild(sausage);
                setTimeout(() => { sausage.remove(); }, duration * 1000);
            }
        }

        function rollDice() {
            if (isRolling) return;
            if (currentMoney < 40) {
                alert("少年耶，你錢不夠啦！先去找阿嬤拿錢！");
                return;
            }

            isRolling = true;
            currentMoney -= 40;
            document.getElementById('money').innerText = currentMoney;
            document.getElementById('rollBtn').disabled = true;
            document.getElementById('addMoneyBtn').disabled = true;
            document.getElementById('result').innerHTML = "十八啦！<br>轉動中...";

            const d1El = document.getElementById('die1');
            const d2El = document.getElementById('die2');
            d1El.classList.add('rolling');
            d2El.classList.add('rolling');

            let rollInterval = setInterval(() => {
                d1El.innerText = Math.floor(Math.random() * 6) + 1;
                d2El.innerText = Math.floor(Math.random() * 6) + 1;
            }, 100);

            setTimeout(() => {
                clearInterval(rollInterval);
                d1El.classList.remove('rolling');
                d2El.classList.remove('rolling');

                const d1 = Math.floor(Math.random() * 6) + 1;
                const d2 = Math.floor(Math.random() * 6) + 1;
                const sum = d1 + d2;
                d1El.innerText = d1;
                d2El.innerText = d2;

                let won = 0;
                if (sum === 2 || sum === 12) won = 4;
                else if (sum === 3 || sum === 11) won = 3;
                else if (sum === 4 || sum === 10) won = 2;
                else if (sum === 5 || sum === 9) won = 1;

                totalSausages += won;
                document.getElementById('sausages').innerText = totalSausages;

                if (won > 0) {
                    document.getElementById('result').innerHTML = `點數和：<span class="highlight">${sum}</span><br>中獎！贏得 <span style="color: #FF0000;">${won}</span> 根香腸！`;
                    spawnSausages(won);
                } else {
                    document.getElementById('result').innerHTML = `點數和：<span class="highlight">${sum}</span><br>槓龜！沒半根！`;
                }

                isRolling = false;
                document.getElementById('rollBtn').disabled = false;
                document.getElementById('addMoneyBtn').disabled = false;
            }, 2000); 
        }
    </script>
</body>
</html>
